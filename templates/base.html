<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Săn Sale Cùng Kim Ngân{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #E8567F;
            --primary-bg: #FFF5F7;
            --card-bg: #FFFFFF;
            --border: #F0D4DA;
            --text: #2D2D2D;
            --text-sec: #666666;
            --text-muted: #999999;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--primary-bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP NAV ===== */
        .topnav {
            background: var(--primary);
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topnav-brand {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            color: #fff;
            text-decoration: none;
        }

        .topnav-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topnav-socials {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            order: 4;
        }

        .topnav-social {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 18px;
            background: rgba(255,255,255,0.15);
            transition: background 0.15s;
        }

        .topnav-social:hover { background: rgba(255,255,255,0.28); }

        .topnav-social svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        .topnav-social img {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
        }

        .topnav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topnav-link {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 6px;
            border: 1.5px solid rgba(255,255,255,0.5);
            transition: all 0.15s;
        }

        .topnav-link:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }

        .topnav-user {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.9;
        }

        /* ===== FOOTER ===== */
        .site-footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 18px 24px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: auto;
        }

        .site-footer .accent { color: var(--primary); }

        /* ===== ZALO BAR ===== */
        .zalo-bar {
            display: flex;
            justify-content: flex-end;
            padding: 12px 24px;
        }

        .zalo-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0068FF;
            color: #fff;
            text-decoration: none;
            padding: 10px 18px 10px 12px;
            border-radius: 28px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 16px rgba(0,104,255,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: zalo-pulse 2s ease-in-out infinite;
        }

        .zalo-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 24px rgba(0,104,255,0.45);
            animation: none;
        }

        @keyframes zalo-pulse {
            0%, 100% { box-shadow: 0 4px 16px rgba(0,104,255,0.35); }
            50% { box-shadow: 0 4px 24px rgba(0,104,255,0.55); }
        }

        .zalo-btn-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.4);
        }

        /* ===== SHARED ===== */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-dark { background: var(--text); color: #fff; }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover { background: var(--primary-bg); opacity: 1; }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Quicksand', sans-serif;
            color: var(--text);
            background: #fff;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        input::placeholder, textarea::placeholder { color: #bbb; }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            display: none;
        }

        .status.success { display: block; background: #E8F5E9; color: #2E7D32; }
        .status.error { display: block; background: #FFEBEE; color: #C62828; }
        .status.loading { display: block; background: #FFF3E0; color: #E65100; }

        @media (max-width: 768px) {
            .topnav { padding: 10px 16px; }
            .topnav-brand { font-size: 16px; }
            .topnav-socials { gap: 6px; margin-top: 6px; }
            .topnav-social { font-size: 10px; padding: 4px 8px; }
            .topnav-social svg { width: 13px; height: 13px; }
            .topnav-social img { width: 15px; height: 15px; }
            .zalo-bar { padding: 10px 16px; }
            .zalo-btn { padding: 8px 14px 8px 10px; font-size: 12px; }
            .zalo-btn-icon { width: 24px; height: 24px; }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <!-- TOP NAV -->
    <nav class="topnav">
        <a href="/" class="topnav-brand">Săn Sale Cùng Kim Ngân</a>
        <div class="topnav-right">
            {% if user %}
                <span class="topnav-user">{{ user }}</span>
                <a href="/admin" class="topnav-link">Dashboard</a>
            {% else %}
                <a href="/login" class="topnav-link">Đăng nhập</a>
            {% endif %}
        </div>
        <div class="topnav-socials">
            <a href="https://www.instagram.com/kynngaan" target="_blank" class="topnav-social">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                kynngaan
            </a>
            <a href="https://vn.shp.ee/xvfc930?smtt=0.0.9" target="_blank" class="topnav-social">
                <img src="/static/logospvideo.jpg" alt="Shopee Video">
                Shopee Video
            </a>
            <a href="https://www.facebook.com/groups/1452616633059278" target="_blank" class="topnav-social">
                <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Group Facebook
            </a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- ZALO GROUP -->
    <div class="zalo-bar">
        <a href="https://zalo.me/g/yyfwzq319" target="_blank" class="zalo-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo" class="zalo-btn-icon">
            Group Săn Sale
        </a>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        &copy; 2026 <span class="accent">Săn Sale Cùng Kim Ngân</span> &middot; Dev by <span class="accent">Pham Toan</span>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
